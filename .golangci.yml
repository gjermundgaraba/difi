version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
    - mirror
    - copyloopvar
    - iface
    - importas
    - nilnesserr
    - nilnil
    - prealloc
    - predeclared
    - reassign
    - testifylint
    - usestdlibvars
    - usetesting
    - wastedassign
  settings:
    goconst:
      ignore-string-values:
        - "^https?$"
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    gosec:
      confidence: low
    nakedret:
      max-func-lines: 0
    revive:
      enable-all-rules: true
      # See the rule descriptions here: https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md
      rules:
        # Rules with configuration
        - name: receiver-naming
          disabled: false
          arguments:
            - max-length: 4
        - name: unhandled-error
          disabled: false
          arguments: # Disable for these ones only
            - fmt.Printf
            - fmt.Print
            - fmt.Println
            - fmt.Fprint
            - fmt.Fprintf
            - fmt.Fprintln
            - bytes.Buffer.Write
            - bytes.Buffer.WriteByte
            - bytes.Buffer.WriteRune
            - bytes.Buffer.WriteString
            - strings.Builder.Write
            - strings.Builder.WriteByte
            - strings.Builder.WriteRune
            - strings.Builder.WriteString
        - name: var-naming
          disabled: false
          arguments:
            - []
            - []
            - [ skipPackageNameChecks: true ]
        # Disabled rules
        # TODO: Some of these are kinda code smelly, should reconsider some of them
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: banned-characters
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: confusing-results
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: deep-exit
          disabled: true
        - name: enforce-switch-style
          disabled: true
        - name: exported
          disabled: true
        - name: function-length
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-control-nesting
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
        - name: unnecessary-format
          disabled: true
        - name: unnecessary-stmt
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: use-any
          disabled: true
        - name: use-errors-new
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: "_test\\.go"
        linters: [gosec]
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/gjermundgaraba/difi)
        - blank
        - dot
      custom-order: true
